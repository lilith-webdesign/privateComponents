# GitLab CI/CD 配置文件
# 用于将 VitePress 项目部署到 GitLab Pages

image: node:18-alpine

# 定义缓存
cache:
    paths:
        - node_modules/

# 定义阶段
stages:
    - build
    - deploy

# 构建任务
pages:
    stage: build
    script:
        - npm install
        - npm run docs:build
        - mv docs/.vitepress/dist/ public/
    artifacts:
        paths:
            - public
    only:
        - main # 或者你的主分支名称
